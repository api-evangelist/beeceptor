    humanURL: https://beeceptor.com/
    description: >-
      Beeceptor's management API provides programmatic access to create and
      manage mock endpoints, rules, and traffic inspection on Scale and
      Enterprise plans. It enables teams to automate mock server provisioning,
      configure request matching rules, and integrate Beeceptor into CI/CD
      pipelines.
